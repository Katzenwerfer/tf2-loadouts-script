con_timestamp	"0"

//=================================================================
// On first loadouts launch creates a loadouts-script folder inside tf/cfg
//=================================================================
alias "loadouts_folder" "host_writeconfig loadouts-script_temporary_cfg_backup.cfg full; ds_dir cfg/loadouts-script; ds_log 0; ds_record; ds_stop; exec loadouts-script_temporary_cfg_backup.cfg"
loadouts_folder

//=================================================================
// Generates loadouts_setup.txt, stops the file from executing each time the game is launched
//=================================================================
con_logfile		"cfg/loadouts-script/loadouts_setup.txt"
echo			"alias loadouts_firstrun"
con_logfile		"console.log"

